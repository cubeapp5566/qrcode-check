<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- QR Corner: Top-Left outer frame -->
  <rect x="68" y="68" width="108" height="108" rx="14" fill="none" stroke="white" stroke-width="18" opacity="0.95"/>
  <!-- Top-Left inner fill -->
  <rect x="98" y="98" width="48" height="48" rx="6" fill="white" opacity="0.95"/>

  <!-- QR Corner: Top-Right outer frame -->
  <rect x="336" y="68" width="108" height="108" rx="14" fill="none" stroke="white" stroke-width="18" opacity="0.95"/>
  <!-- Top-Right inner fill -->
  <rect x="366" y="98" width="48" height="48" rx="6" fill="white" opacity="0.95"/>

  <!-- QR Corner: Bottom-Left outer frame -->
  <rect x="68" y="336" width="108" height="108" rx="14" fill="none" stroke="white" stroke-width="18" opacity="0.95"/>
  <!-- Bottom-Left inner fill -->
  <rect x="98" y="366" width="48" height="48" rx="6" fill="white" opacity="0.95"/>

  <!-- QR Data dots (bottom-right quadrant + center scatter) -->
  <rect x="210" y="68"  width="22" height="22" rx="4" fill="white" opacity="0.55"/>
  <rect x="248" y="68"  width="22" height="22" rx="4" fill="white" opacity="0.40"/>
  <rect x="286" y="68"  width="22" height="22" rx="4" fill="white" opacity="0.55"/>

  <rect x="210" y="106" width="22" height="22" rx="4" fill="white" opacity="0.35"/>
  <rect x="248" y="106" width="22" height="22" rx="4" fill="white" opacity="0.55"/>

  <rect x="210" y="144" width="22" height="22" rx="4" fill="white" opacity="0.50"/>
  <rect x="286" y="144" width="22" height="22" rx="4" fill="white" opacity="0.35"/>

  <rect x="68"  y="210" width="22" height="22" rx="4" fill="white" opacity="0.50"/>
  <rect x="106" y="210" width="22" height="22" rx="4" fill="white" opacity="0.35"/>
  <rect x="144" y="210" width="22" height="22" rx="4" fill="white" opacity="0.55"/>
  <rect x="210" y="210" width="22" height="22" rx="4" fill="white" opacity="0.45"/>
  <rect x="248" y="210" width="22" height="22" rx="4" fill="white" opacity="0.30"/>
  <rect x="286" y="210" width="22" height="22" rx="4" fill="white" opacity="0.50"/>

  <rect x="68"  y="248" width="22" height="22" rx="4" fill="white" opacity="0.35"/>
  <rect x="144" y="248" width="22" height="22" rx="4" fill="white" opacity="0.40"/>
  <rect x="210" y="248" width="22" height="22" rx="4" fill="white" opacity="0.55"/>
  <rect x="286" y="248" width="22" height="22" rx="4" fill="white" opacity="0.35"/>

  <rect x="68"  y="286" width="22" height="22" rx="4" fill="white" opacity="0.50"/>
  <rect x="106" y="286" width="22" height="22" rx="4" fill="white" opacity="0.55"/>
  <rect x="144" y="286" width="22" height="22" rx="4" fill="white" opacity="0.35"/>
  <rect x="210" y="286" width="22" height="22" rx="4" fill="white" opacity="0.40"/>

  <!-- Check badge circle -->
  <circle cx="368" cy="368" r="108" fill="url(#checkGrad)" filter="url(#shadow)"/>

  <!-- Checkmark -->
  <polyline
    points="312,370 352,412 428,322"
    fill="none"
    stroke="white"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
